<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="bg-dark-subtle" onload="loadTodo()">
    <div class="container bg-dark text-center mt-3 rounded-1 pt-3">
        <h1 class="text-info">Todo List</h1>

        <div id="displayArea" class="w-50 bg-secondary-subtle mt-3 border border-info border-1 rounded-3 mb-4"
            style="min-height: 200px; margin: auto;"></div>

        <input type="text" placeholder="enter todo task" id="todoInp" autofocus
            class="w-25  rounded-3 border border-none bg-secondary-subtle fs-sm-5 " style="height: 40px;">

        <p>
            <button onclick="addTodo()" class="btn btn-dark mt-3 w-50 fw-bolder fs-2 border border-1 text-info">Add
                Task</button>
        </p>
        <p><button class="btn btn-danger border border-danger" onclick="clearTodoList()">Clear Todo</button></p>
        <p>You have <span id="todoCount"></span> task(s)</p>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">Edit task</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">

                    <input type="text" placeholder="enter todo task" id="newTodoInp" autofocus
                    class="w-75  rounded-3 border border-none bg-secondary-subtle fs-sm-5 " style="height: 40px;">

                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" onclick="makeChanges()" data-bs-dismiss="modal">Save changes</button>
                </div>
            </div>
        </div>
    </div>
</body>
<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

</html>
